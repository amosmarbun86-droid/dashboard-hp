<!DOCTYPE html>
<html>
<head>
    <title>Device</title>
</head>
<body>

Device ID:
<input type="text" id="device_id">
<button onclick="start()">Start</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBkC-Axq-OJ1tqKWgS6iRyLHKrj_3F-yw",
  authDomain: "dashboard-hp-7f75d.firebaseapp.com",
  projectId: "dashboard-hp-7f75d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.start = function(){
    const deviceId = document.getElementById("device_id").value;

    setInterval(async () => {

        await updateDoc(doc(db, "devices", deviceId), {
            status: "online",
            battery: Math.floor(Math.random()*40)+60,
            last_update: new Date().toLocaleString()
        });

        // OFFLINE DETECTOR nanti dari dashboard

        const cmdDoc = await getDoc(doc(db, "commands", deviceId));
        const cmd = cmdDoc.data().command;

        if(cmd !== "none"){
            alert("Command: " + cmd);

            await addDoc(collection(db, "logs"), {
                device: deviceId,
                activity: "Execute " + cmd,
                time: new Date().toLocaleString()
            });

            await updateDoc(doc(db, "commands", deviceId), {
                command: "none"
            });
        }

    }, 5000);
}
</script>
</body>
</html>
