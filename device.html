<!DOCTYPE html>
<html>
<head>
    <title>Device</title>
    <style>
        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            padding:20px;
        }
        input, button{
            padding:8px;
            margin:5px;
        }
    </style>
</head>
<body>

<h2>Device Controller</h2>

Device ID:
<input type="text" id="device_id">
<button onclick="startDevice()">Start</button>

<p id="status">Status: Offline</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBkC-Axq-OJ1tqKWgS6iRyLHKrj_3F-yw",
  authDomain: "dashboard-hp-7f75d.firebaseapp.com",
  projectId: "dashboard-hp-7f75d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.startDevice = function(){
    const deviceId = document.getElementById("device_id").value;

    document.getElementById("status").innerText = "Status: Online";

    setInterval(async () => {

        // Update status device
        await updateDoc(doc(db, "devices", deviceId), {
            status: "online",
            battery: Math.floor(Math.random()*40)+60,
            last_update: new Date().toLocaleString()
        });

        // Cek command dari dashboard
        const deviceDoc = await getDoc(doc(db, "devices", deviceId));
        const data = deviceDoc.data();
        const cmd = data.command;

        if(cmd && cmd !== "-"){
            alert("Command: " + cmd);

            await addDoc(collection(db, "logs"), {
                device: deviceId,
                activity: "Execute " + cmd,
                time: new Date().toLocaleString()
            });

            await updateDoc(doc(db, "devices", deviceId), {
                command: "-"
            });
        }

    }, 5000);
}
</script>

</body>
</html>
