<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Device</title>
    <style>
        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            margin:0;
            padding:20px;
        }
        .card{
            background:#1e293b;
            padding:15px;
            margin:10px;
            border-radius:10px;
        }
        button{
            padding:6px 12px;
            margin:3px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .lock{background:red;color:white;}
        .alarm{background:orange;color:black;}
        .restart{background:yellow;color:black;}
    </style>
</head>
<body>

<h2>Dashboard Monitoring Device</h2>
<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "APIKEY_KAMU",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// REALTIME LOAD DATA
onSnapshot(collection(db, "devices"), (snapshot) => {
    let html = "";

    snapshot.forEach((docSnap) => {
        const d = docSnap.data();
        const id = docSnap.id;

        let statusColor = d.status === "online" ? "lime" : "red";

        html += `
        <div class="card">
            <h3>${d.nama}</h3>
            Status: <span style="color:${statusColor}">${d.status}</span><br>
            Battery: ${d.battery}%<br>
            Lokasi: ${d.lokasi}<br>
            Update: ${d.last_update}<br><br>

            <button class="lock" onclick="sendCommand('${id}','lock')">Lock</button>
            <button class="alarm" onclick="sendCommand('${id}','alarm')">Alarm</button>
            <button class="restart" onclick="sendCommand('${id}','restart')">Restart</button>
        </div>
        `;
    });

    document.getElementById("data").innerHTML = html;
});

// SEND COMMAND
window.sendCommand = async function(deviceId, cmd){
    await updateDoc(doc(db, "devices", deviceId), {
        command: cmd
    });

    await addDoc(collection(db, "logs"), {
        device: deviceId,
        activity: "Command " + cmd,
        time: new Date().toLocaleString()
    });

    alert("Command terkirim: " + cmd);
}
</script>
</body>
</html>
